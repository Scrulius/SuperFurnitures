# ============================================================
#  SuperFurnitures — catálogo de muebles
# ============================================================
# Cada entrada bajo "furniture:" define un mueble colocable.
# El jugador coloca el mueble haciendo clic derecho con su item
# y lo recoge con SHIFT + clic derecho y la mano vacía (solo el
# dueño, o superfurnitures.admin.bypass).
#
# El ITEM del mueble puede ser de dos clases (al menos una es OBLIGATORIA):
#   - item:        → item NATIVO, lo crea el propio plugin (sin MythicMobs)
#   - mythic-item: → item de MythicMobs (requiere MythicMobs instalado)
# Si defines los dos, el plugin da/devuelve el NATIVO, pero los items MM
# antiguos que ya circulen siguen colocando el mueble (migración suave).
#
#   nombre_del_mueble:
#     model: NombreEnLibrary       # modelo descargado con /bde download (OBLIGATORIO)
#     item:                        # item NATIVO (recomendado; no necesita MythicMobs)
#       material: PLAYER_HEAD      # cualquier material de item; opcional si hay head-texture
#       name: "&6Silla de roble"   # códigos & o MiniMessage; vacío = nombre del id
#       lore:
#         - "&7Clic derecho para colocarla"
#       glow: false                # true = brillo de encantamiento
#       head-texture: ""           # base64 de minecraft-heads.com (solo PLAYER_HEAD):
#                                  # apariencia 100% custom SIN resource pack
#     mythic-item: IdDelItemMM     # alternativa: item de MythicMobs
#     permission: ""               # permiso extra por mueble (opcional, vacío = solo el global)
#     max-per-player: -1           # tope de ESTE mueble por jugador (-1 = solo el límite global)
#     anchor: floor                # floor | wall | ceiling
#     solid: false                 # true = pone bloques barrier invisibles (colisión real).
#                                  # ⚠ Solo para muebles GRANDES que deban bloquear el paso
#                                  # (mesas, armarios): el barrier estorba al clicar el mueble
#                                  # y al construir cerca. Sillas/decoración: déjalo en false.
#     footprint: []                # offsets "x,y,z" (enteros, espacio local) de los barriers;
#                                  # vacío + solid = columna en el bloque de origen hasta la
#                                  # altura del hitbox. Se rotan con el mueble.
#     animated: false              # true = reproduce su animación en loop mientras esté colocado
#     hitbox:                      # la "caja" clicable del mueble
#       width: 1.0
#       height: 1.0
#     interaction:
#       type: none                 # none | seat | menu | commands
#       seats:                     # (type: seat) offsets "x,y,z" de cada plaza, espacio local
#         - "0.0,0.4,0.0"          # (+z = hacia donde mira el mueble); varios = multi-plaza
#       menu: ""                   # (type: menu) menú de DeluxeMenus → dm open <menu> <jugador>
#       commands: []               # (type: commands) "player: comando" o "console: comando"
#                                  # con {player} disponible
#     sounds:
#       place: block.wood.place
#       pickup: block.wood.break
#
# Los modelos de techo deben estar autorados colgando BAJO su origen;
# suelo y pared con el origen en su base.

limits:
  per-player-default: 20     # máximo de muebles colocados por jugador;
                             # superfurnitures.limit.N lo eleva (gana el mayor)
  per-chunk: 12              # máximo de muebles por chunk

disabled-worlds: []          # mundos donde NO se pueden colocar muebles

max-parts-warn: 100          # WARN en consola si el modelo de un mueble pasa de N piezas
                             # (cada pieza es una entity que el cliente debe renderizar)

furniture:
  # Ejemplo con item NATIVO (sin MythicMobs):
  # silla_ejemplo:
  #   model: Silla
  #   item:
  #     material: PLAYER_HEAD
  #     name: "&6Silla de roble"
  #     lore: [ "&7Clic derecho para colocarla" ]
  #     head-texture: "eyJ0ZXh0dXJlcyI6..."   # base64 de minecraft-heads.com
  #   anchor: floor
  #   hitbox: { width: 0.8, height: 0.9 }
  #   interaction:
  #     type: seat
  #     seats: [ "0.0,0.4,0.0" ]
  #
  # Ejemplo con item de MythicMobs (clásico):
  # mesa_ejemplo:
  #   model: Mesa
  #   mythic-item: MesaItem
  #   anchor: floor
  #   solid: true
  #   hitbox: { width: 1.0, height: 1.0 }
